# Local kind cluster for the comlink-kvd demo (PLAN §8).
#
# Layout:
#   1 control-plane node (kube-apiserver, scheduler, etcd, etc.)
#   4 worker nodes — the StatefulSet has 3 replicas with
#     podAntiAffinity, so we provision ONE EXTRA worker to give
#     `kubectl cordon` + `kubectl delete pod` a healthy destination
#     to reschedule onto. The 4th node sits idle until a
#     migration demo moves a pod onto it.
#
# Port-map: the host's 30080 (NodePort range) maps to the kind
# control plane's 30080 so a developer can curl the kvd HTTP
# front-end from outside the cluster without `kubectl
# port-forward`. The NodePort itself is declared in the
# kvd-http Service manifest.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4

name: comlink

nodes:
  - role: control-plane
    extraPortMappings:
      - containerPort: 30080
        hostPort: 30080
        protocol: TCP
      - containerPort: 30090
        hostPort: 30090
        protocol: TCP
      - containerPort: 30030
        hostPort: 30030
        protocol: TCP
  - role: worker
  - role: worker
  - role: worker
  - role: worker
