# RBAC for the collector's prometheus receiver (kubernetes_sd).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: otel-collector
  namespace: comlink
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: comlink-otel-collector
rules:
  - apiGroups: [""]
    resources: ["nodes", "nodes/proxy", "services", "endpoints", "pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: comlink-otel-collector
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: comlink-otel-collector
subjects:
  - kind: ServiceAccount
    name: otel-collector
    namespace: comlink
