# OpenTelemetry collector config.
#
# This is the "ready for app instrumentation" layer — no OTLP
# emission from comlink-kvd yet (Phase 8(e) went Prom-direct for
# simplicity). What the collector DOES today:
#
#   - OTLP receivers (gRPC :4317, HTTP :4318) ready to accept
#     spans/metrics from anything in the cluster that wants to
#     push.
#   - Prometheus receiver that scrapes the comlink-kvd /metrics
#     endpoints, identical to the Prometheus deployment — so the
#     collector pipeline can transform / re-export them.
#   - Two exporters:
#       * debug (logs verbose, useful while wiring things up)
#       * prometheus exporter on :8889 so collected metrics show
#         up at the collector itself (Prometheus can additionally
#         scrape THAT endpoint, fanning data through both paths).
#
# Phase 8+ work: add OTLP exporter from comlink-kvd → collector,
# then add a traces pipeline.
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: comlink
data:
  collector.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
      prometheus:
        config:
          scrape_configs:
            - job_name: comlink-kvd
              scrape_interval: 10s
              kubernetes_sd_configs:
                - role: pod
                  namespaces:
                    names: [comlink]
              relabel_configs:
                - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
                  action: keep
                  regex: 'true'
                - source_labels:
                    - __address__
                    - __meta_kubernetes_pod_annotation_prometheus_io_port
                  action: replace
                  regex: '([^:]+)(?::\d+)?;(\d+)'
                  replacement: '$1:$2'
                  target_label: __address__
                - action: labelmap
                  regex: __meta_kubernetes_pod_label_(.+)
                - source_labels: [__meta_kubernetes_namespace]
                  target_label: namespace
                - source_labels: [__meta_kubernetes_pod_name]
                  target_label: pod

    processors:
      batch:
        timeout: 5s
        send_batch_size: 1024

    exporters:
      debug:
        verbosity: basic
      prometheus:
        endpoint: 0.0.0.0:8889
        send_timestamps: true
        metric_expiration: 5m
        resource_to_telemetry_conversion:
          enabled: true

    service:
      pipelines:
        metrics:
          receivers: [otlp, prometheus]
          processors: [batch]
          exporters: [debug, prometheus]
        traces:
          receivers: [otlp]
          processors: [batch]
          exporters: [debug]
