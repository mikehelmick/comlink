# ServiceAccount + ClusterRole for Prometheus to discover and
# scrape pods via kubernetes_sd_configs. Scoped narrowly: list
# pods/services/endpoints across the cluster, nothing else.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: comlink
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: comlink-prometheus
rules:
  - apiGroups: [""]
    resources: ["nodes", "nodes/proxy", "services", "endpoints", "pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: comlink-prometheus
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: comlink-prometheus
subjects:
  - kind: ServiceAccount
    name: prometheus
    namespace: comlink
