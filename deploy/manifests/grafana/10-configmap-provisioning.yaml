# Grafana provisioning: a data source that points at the
# in-cluster Prometheus, and a "comlink" dashboard provider that
# loads JSON dashboards from /var/lib/grafana/dashboards.
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-provisioning
  namespace: comlink
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: prometheus
        type: prometheus
        access: proxy
        url: http://prometheus.comlink.svc.cluster.local:9090
        isDefault: true
        editable: false

  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: comlink
        orgId: 1
        folder: ""
        type: file
        disableDeletion: true
        updateIntervalSeconds: 10
        options:
          path: /var/lib/grafana/dashboards
