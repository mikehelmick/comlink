# ClusterIP for the kvstore HTTP front-end (Set/Get/Delete/
# cluster info). Each replica is a viable target — reads are
# eventually-consistent and writes go through total ordering
# regardless of which replica receives them, so a round-robin
# Service is fine.
#
# Also exposed as a NodePort so a developer can curl from the
# host without `kubectl port-forward`. The kind-config.yaml
# maps host port 30080 → control-plane node port 30080.
apiVersion: v1
kind: Service
metadata:
  name: comlink-kvd-http
  namespace: comlink
  labels:
    app.kubernetes.io/name: comlink-kvd
    app.kubernetes.io/component: http
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: comlink-kvd
  ports:
    - name: http
      port: 8000
      targetPort: http
      nodePort: 30080
      protocol: TCP
