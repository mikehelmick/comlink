syntax = "proto3";

// Psync-internal types: state persisted via stable.Storage and
// wire-level control messages exchanged between Psync instances
// (lost-message requests, restart messages, etc.). Application
// payloads ride inside Envelope.payload from comlink.proto and do
// not appear here.
package comlink.v1;

option go_package = "github.com/mikehelmick/comlink/internal/pb/comlink/v1;comlinkv1";

// MaskState is the persisted form of a Psync replica's mask
// (paper §2.3, PLAN §5.2). Persisting on every change keeps the
// recovery path simple in Phase 4 — there's no special "checkpoint
// the mask" step to coordinate, the latest persisted MaskState IS
// the recovery state.
message MaskState {
  // Each entry is the bytes of a ReplicaID currently masked out at
  // this replica.
  repeated bytes masked_replicas = 1;
}
