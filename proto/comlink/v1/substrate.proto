syntax = "proto3";

// Substrate-level wire types: the per-message wrapper that Phase 3+
// puts inside Envelope.payload to multiplex application data with
// failure-detection and membership-protocol control events.
//
// Layering:
//   PsyncMessage { Envelope | LostMessageRequest | Restart* }   <- transport wrapper
//     Envelope.payload -> ConvFrame                             <- this file
//                         ConvFrame.body { app | heartbeat | membership }
//
// Apps that use the membership.Manager API see only the unwrapped
// app bytes; the Manager wraps/unwraps ConvFrame transparently.
// FailureDetection / Membership emit their own ConvFrame variants
// directly and rely on the Manager's frame routing on receive.
//
// Membership protocol design split (PLAN §2.13): SuspectDown is
// informational (FYI / mask trigger), and VoteOut/VoteIn are the
// explicit mechanisms for permanent ML mutation. SuspectDown does
// NOT carry an ack/nack response; only VoteOut and VoteIn do.
package comlink.v1;

import "comlink/v1/comlink.proto";

option go_package = "github.com/mikehelmick/comlink/internal/pb/comlink/v1;comlinkv1";

// ConvFrame is the per-Envelope payload discriminator that
// distinguishes application data from substrate control messages.
message ConvFrame {
  oneof body {
    bytes app = 1;
    Heartbeat heartbeat = 2;
    MembershipEvent membership = 3;
    Watermark watermark = 4;
  }
}

// Watermark advertises the lowest log offset the sender still
// needs for its own recovery (PLAN §2.8). Each replica
// periodically multicasts its watermark; receivers track the
// most recent watermark from every member and compute
// min(watermarks) over the active membership list to find the
// safe trim frontier.
//
// The sender ReplicaID is implicit from envelope.id.sender, so
// it does not appear here.
message Watermark {
  // applied_through_offset is the highest log offset whose
  // message has been applied at this replica (i.e. its SM has
  // processed it). Below the safe-trim frontier is the per-
  // replica minimum of this and snapshot_through_offset; the
  // cluster-wide frontier is the min of those per-replica
  // minimums.
  //
  // Named `offset` historically — the field tag is preserved so
  // older replicas reading newer messages see the applied
  // offset correctly.
  uint64 offset = 1;

  // snapshot_through_offset is the highest log offset DURABLY
  // covered by this replica's persisted application snapshot
  // (see comlink.Snapshotter / Substrate.AdvanceSnapshotWatermark,
  // PLAN §10). Zero means the replica has no snapshot — in which
  // case trim cannot safely advance past zero on its behalf,
  // because a future joiner could not recover.
  //
  // Only meaningful for substrates whose StateMachine
  // implements Snapshotter. The system conv's Manager
  // historically broadcast Watermark with applied=snapshot;
  // wire format continues to support that case naturally
  // (snapshot_through_offset = 0 means "no snapshot" rather
  // than "snapshot at offset 0").
  uint64 snapshot_through_offset = 2;
}

// Heartbeat is a content-free dummy message emitted by
// FailureDetection when the conversation has been quiet for the
// failure-detection interval. Per paper §4 it serves a dual
// purpose: liveness signal AND ack acceleration (its vector clock
// advances stability detection for messages it depends on).
message Heartbeat {}

// MembershipEvent carries one of the membership-protocol control
// messages.
//
// SuspectDown is informational: receivers update their
// SuspectDownList state but do NOT respond.
//
// VoteOut / VoteIn are the explicit mechanisms for permanent ML
// mutation; peers respond with VoteOutAck/Nack or VoteInAck/Nack.
//
// Note on missing (p is up) / (Ack, p is up) per PLAN §2.13:
// recovery is implicit in our split-suspicion-and-voting design.
// A previously-silent replica that resumes sending is auto-cleared
// from peers' SuspectDownList by the pump's clearSuspicion path
// (Phase 3(d)). Heartbeats plus psync.Restart cover the
// crashed-and-restarted catch-up case. Field numbers 2 and 9 are
// reserved to leave room for re-adding (p is up) semantics if a
// future use case demands explicit recovery announcement.
message MembershipEvent {
  reserved 2, 9;
  oneof event {
    SuspectDown suspect_down = 1;
    VoteOut vote_out = 3;
    VoteOutAck vote_out_ack = 4;
    VoteOutNack vote_out_nack = 5;
    VoteIn vote_in = 6;
    VoteInAck vote_in_ack = 7;
    VoteInNack vote_in_nack = 8;
    MemberAdd member_add = 10;
  }
}

// SuspectDown is informational: the sender's FailureDetector has
// flagged `suspect` as silent. Receivers update their local
// SuspectDownList only; recovery happens implicitly when a
// subsequent message arrives from suspect (PLAN §2.13).
message SuspectDown {
  ReplicaID suspect = 1;
}

// VoteOut proposes the permanent removal of `target` from the
// membership list. Paper §4.2 / PLAN §2.13.
message VoteOut {
  ReplicaID target = 1;
}

// VoteOutAck signals the sender agrees with removing `target`:
// they have not received any message from target at or after the
// VoteOut's logical time.
message VoteOutAck {
  ReplicaID target = 1;
}

// VoteOutNack signals the sender disagrees with removing `target`:
// they have evidence target is alive.
message VoteOutNack {
  ReplicaID target = 1;
}

// VoteIn proposes the permanent addition of `target` to the
// membership list. addr is the network address peers should use to
// reach target (the gRPC transport, for example, needs this to
// open a connection).
message VoteIn {
  ReplicaID target = 1;
  string addr = 2;
}

// VoteInAck signals the sender agrees with adding `target`.
message VoteInAck {
  ReplicaID target = 1;
}

// VoteInNack signals the sender disagrees with adding `target`
// (e.g. policy violation, conflict).
message VoteInNack {
  ReplicaID target = 1;
}

// MemberAdd is the COMMIT phase of VoteIn (PLAN §2.10.1, design
// pass): once the proposer has collected quorum VoteInAcks with
// no VoteInNacks, it broadcasts MemberAdd as the partial-order
// anchor at which every replica grows its psync.Membership by
// one slot for `target`.
//
// Late-arriving replicas catch up via the standard lost-message
// protocol — MemberAdd's vector clock places it in the causal
// chain, so any post-reshape message the late replica receives
// will reference MemberAdd as a missing predecessor and pull it
// in.
message MemberAdd {
  ReplicaID target = 1;
  // addr is the network address peers should use to reach
  // `target`. Mirrors the addr field on the originating VoteIn
  // — included on MemberAdd so non-proposer replicas can persist
  // routing information without retaining VoteIn state.
  string addr = 2;
}
