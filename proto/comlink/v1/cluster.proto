syntax = "proto3";

// Package comlink.v1 — Cluster admin RPCs.
//
// The Cluster service is registered on the same gRPC server as
// Transport but logically separate: it carries cluster-wide
// bootstrap and observability operations, not per-conversation
// traffic. The Join RPC is the sponsor handshake (PLAN §5(h)):
// a new node that lacks a persisted ClusterID dials a sponsor
// and requests admission. The sponsor MUST first VoteIn the
// joiner via the standard membership protocol; on success it
// returns the ClusterID and the post-admission membership list
// (including the joiner). The joiner installs those locally and
// proceeds as a regular replica.
//
// Join is exempt from the ClusterID handshake interceptor —
// the joiner has no ClusterID to send until Join completes.
// See transport/grpc.ExemptHandshakeMethods.
package comlink.v1;

option go_package = "github.com/mikehelmick/comlink/internal/pb/comlink/v1;comlinkv1";

import "comlink/v1/comlink.proto";

service Cluster {
  // Join requests admission to the cluster. The sponsor runs the
  // VoteIn protocol with the supplied joiner identity and addr,
  // then returns the ClusterID and the post-admission cluster
  // membership. Returns an error (codes.FailedPrecondition,
  // codes.PermissionDenied, etc) if VoteIn was rejected.
  rpc Join(JoinRequest) returns (JoinResponse);
}

message JoinRequest {
  // joiner is the replica requesting admission.
  ReplicaID joiner = 1;
  // joiner_addr is the network address peers should use to
  // reach the joiner after admission. Propagated through the
  // VoteIn protocol's MemberAdd commit message so every replica
  // can persist routing information.
  string joiner_addr = 2;
}

message JoinResponse {
  // cluster_id is the cluster's ClusterID. The joiner persists
  // it locally and uses it to derive the system conversation ID.
  ClusterID cluster_id = 1;
  // members is the cluster's membership list AFTER the joiner
  // has been admitted (so it includes the joiner).
  repeated ClusterMember members = 2;
}
