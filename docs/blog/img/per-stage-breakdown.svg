<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 280" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <style>
    .title { font-size: 17px; font-weight: 600; fill: #1a1f2e; }
    .sub   { font-size: 12px; fill: #5a6478; }
    .lbl   { font-size: 12px; fill: #1a1f2e; }
    .v     { font-size: 12px; font-weight: 600; fill: #ffffff; }
    .vd    { font-size: 12px; font-weight: 600; fill: #1a1f2e; }
  </style>
  <rect width="800" height="280" fill="#fbfcfd"/>
  <text x="40" y="30" class="title">Where Substrate.Submit's 322 ms actually goes</text>
  <text x="40" y="50" class="sub">Per-stage timing histograms, baseline 3-replica + 8 writers + 64 KiB values</text>

  <!-- single stacked horizontal bar, scaled to total 322ms over 600px -->
  <!-- handleSend 5.4ms → 10.06px @ x=160 -->
  <rect x="160" y="90"     width="10"   height="40" fill="#6cc1ff"/>
  <!-- apply_decode + apply_lookup + SM.Apply ~120us → 0.2px (invisible) — omit -->
  <!-- submit_wait 315ms → 587px @ x=170 -->
  <rect x="170" y="90"     width="587"  height="40" fill="#c25757"/>

  <text x="165" y="80"  text-anchor="middle" class="vd">5 ms</text>
  <text x="465" y="115" text-anchor="middle" class="v">submit_wait — 315 ms (98%)</text>
  <text x="465" y="135" text-anchor="middle" class="v" fill="#ffffff">waiting for OrderingTotal wave gate</text>

  <text x="160" y="160" text-anchor="end" class="lbl">handleSend</text>

  <!-- legend strip -->
  <g transform="translate(40, 200)">
    <rect x="0"   y="0" width="14" height="14" fill="#6cc1ff"/>
    <text x="22"  y="11" class="lbl">in-genserver work (handleSend)</text>
    <rect x="240" y="0" width="14" height="14" fill="#c25757"/>
    <text x="262" y="11" class="lbl">waiting (wave-gate continuationProperty)</text>
  </g>
  <text x="40" y="245" class="sub">apply pump's actual work (decode + lookup + SM.Apply) is &lt; 200 µs total — invisible at this scale</text>
</svg>
