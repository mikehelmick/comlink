<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <style>
    .title { font-size: 18px; font-weight: 600; fill: #1a1f2e; }
    .axis  { font-size: 11px; fill: #5a6478; }
    .label { font-size: 12px; fill: #1a1f2e; }
    .value { font-size: 13px; font-weight: 600; fill: #ffffff; }
    .vbig  { font-size: 14px; font-weight: 700; fill: #ffffff; }
    .grid  { stroke: #e6e8eb; stroke-width: 1; }
  </style>

  <rect width="800" height="380" fill="#fbfcfd"/>
  <text x="40" y="30" class="title">Substrate.Submit wait time, milliseconds (lower is better)</text>

  <!-- y-axis 0..360, gridlines -->
  <line x1="220" y1="60"  x2="780" y2="60"  class="grid"/>
  <line x1="220" y1="110" x2="780" y2="110" class="grid"/>
  <line x1="220" y1="160" x2="780" y2="160" class="grid"/>
  <line x1="220" y1="210" x2="780" y2="210" class="grid"/>
  <line x1="220" y1="260" x2="780" y2="260" class="grid"/>
  <line x1="220" y1="310" x2="780" y2="310" class="grid"/>
  <text x="215" y="64"  text-anchor="end" class="axis">360</text>
  <text x="215" y="114" text-anchor="end" class="axis">300</text>
  <text x="215" y="164" text-anchor="end" class="axis">240</text>
  <text x="215" y="214" text-anchor="end" class="axis">180</text>
  <text x="215" y="264" text-anchor="end" class="axis">120</text>
  <text x="215" y="314" text-anchor="end" class="axis">0</text>

  <!-- 250 px tall range = 360ms. So 1ms = 0.694px, height = ms * 0.694 -->
  <!-- bar1: 317 ms → height=220 → y=90 -->
  <rect x="240" y="90" width="80" height="220" fill="#c25757" rx="2"/>
  <text x="280" y="106" text-anchor="middle" class="vbig">317 ms</text>
  <text x="280" y="335" text-anchor="middle" class="label">baseline</text>
  <text x="280" y="349" text-anchor="middle" class="axis">OrderingTotal, no ack</text>

  <!-- bar2: 227 ms → height=158 → y=152 -->
  <rect x="350" y="152" width="80" height="158" fill="#6c7a9c" rx="2"/>
  <text x="390" y="168" text-anchor="middle" class="value">227 ms</text>
  <text x="390" y="335" text-anchor="middle" class="label">+ acks (10ms)</text>
  <text x="390" y="349" text-anchor="middle" class="axis">single source</text>

  <!-- bar3: 193 ms → height=134 → y=176 -->
  <rect x="460" y="176" width="80" height="134" fill="#6c7a9c" rx="2"/>
  <text x="500" y="192" text-anchor="middle" class="value">193 ms</text>
  <text x="500" y="335" text-anchor="middle" class="label">+ acks (2ms)</text>
  <text x="500" y="349" text-anchor="middle" class="axis">single source</text>

  <!-- bar4: 90 ms → height=62 → y=248 -->
  <rect x="570" y="248" width="80" height="62" fill="#6dd17e" rx="2"/>
  <text x="610" y="264" text-anchor="middle" class="value">90 ms</text>
  <text x="610" y="335" text-anchor="middle" class="label">+ round-robin</text>
  <text x="610" y="349" text-anchor="middle" class="axis">+ acks</text>

  <!-- bar5: 8 ms → height=6 → y=304 -->
  <rect x="680" y="304" width="80" height="6" fill="#2aab44" rx="2"/>
  <text x="720" y="298" text-anchor="middle" class="value" fill="#1a1f2e">8 ms</text>
  <text x="720" y="335" text-anchor="middle" class="label">OrderingPartial</text>
  <text x="720" y="349" text-anchor="middle" class="axis">+ app-level LWW</text>

  <text x="40" y="60" class="axis">submit_wait (ms)</text>
</svg>
