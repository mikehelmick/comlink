<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <style>
    .title { font-size: 18px; font-weight: 600; fill: #1a1f2e; }
    .axis  { font-size: 11px; fill: #5a6478; }
    .label { font-size: 12px; fill: #1a1f2e; }
    .value { font-size: 13px; font-weight: 600; fill: #ffffff; }
    .vbig  { font-size: 14px; font-weight: 700; fill: #ffffff; }
    .grid  { stroke: #e6e8eb; stroke-width: 1; }
  </style>

  <rect width="800" height="380" fill="#fbfcfd"/>
  <text x="40" y="30" class="title">Write throughput, writes/sec (3-replica, 8 concurrent writers, 64 KiB values)</text>

  <!-- y-axis gridlines, scale 0..140 -->
  <line x1="220" y1="60"  x2="780" y2="60"  class="grid"/>
  <line x1="220" y1="110" x2="780" y2="110" class="grid"/>
  <line x1="220" y1="160" x2="780" y2="160" class="grid"/>
  <line x1="220" y1="210" x2="780" y2="210" class="grid"/>
  <line x1="220" y1="260" x2="780" y2="260" class="grid"/>
  <line x1="220" y1="310" x2="780" y2="310" class="grid"/>
  <text x="215" y="64"  text-anchor="end" class="axis">140</text>
  <text x="215" y="114" text-anchor="end" class="axis">120</text>
  <text x="215" y="164" text-anchor="end" class="axis">90</text>
  <text x="215" y="214" text-anchor="end" class="axis">60</text>
  <text x="215" y="264" text-anchor="end" class="axis">30</text>
  <text x="215" y="314" text-anchor="end" class="axis">0</text>

  <!-- bar width 80, gap 30, start x=240 -->
  <!-- bar1: 12.3/s — original broken-soak measurement, height=27 → y=283 -->
  <rect x="240" y="283" width="80" height="27" fill="#c25757" rx="2"/>
  <text x="280" y="299" text-anchor="middle" class="value">12.3</text>
  <text x="280" y="335" text-anchor="middle" class="label">original</text>
  <text x="280" y="349" text-anchor="middle" class="axis">(broken soak driver)</text>

  <!-- bar2: 40.1/s — proper baseline, height=88 → y=222 -->
  <rect x="350" y="222" width="80" height="88" fill="#6c7a9c" rx="2"/>
  <text x="390" y="238" text-anchor="middle" class="value">40.1</text>
  <text x="390" y="335" text-anchor="middle" class="label">proper baseline</text>
  <text x="390" y="349" text-anchor="middle" class="axis">(http+proto+lock fixes)</text>

  <!-- bar3: 19.7/s — proactive acks at single-source, height=43 → y=267 -->
  <rect x="460" y="267" width="80" height="43" fill="#6cc1ff" rx="2"/>
  <text x="500" y="283" text-anchor="middle" class="value">19.7</text>
  <text x="500" y="335" text-anchor="middle" class="label">+ acks (2ms)</text>
  <text x="500" y="349" text-anchor="middle" class="axis">single source</text>

  <!-- bar4: 44.6/s — round-robin + acks, height=98 → y=212 -->
  <rect x="570" y="212" width="80" height="98" fill="#6dd17e" rx="2"/>
  <text x="610" y="228" text-anchor="middle" class="value">44.6</text>
  <text x="610" y="335" text-anchor="middle" class="label">+ round-robin</text>
  <text x="610" y="349" text-anchor="middle" class="axis">+ acks</text>

  <!-- bar5: 122.0/s — OrderingPartial + LWW + RR, height=269 → y=41 -->
  <rect x="680" y="41" width="80" height="269" fill="#2aab44" rx="2"/>
  <text x="720" y="57" text-anchor="middle" class="vbig">122.0</text>
  <text x="720" y="335" text-anchor="middle" class="label">OrderingPartial</text>
  <text x="720" y="349" text-anchor="middle" class="axis">+ app-level LWW</text>

  <text x="40" y="60" class="axis">writes/sec</text>
</svg>
